name: Update README repo stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"

permissions:
  contents: write

jobs:
  update-readme-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out profile repo
        uses: actions/checkout@v7

      - name: Update README stars and forks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python <<'PY'
          import json
          import os
          import re
          import urllib.request

          OWNER = "Nathaniel-Coulter"

          REPOS = {
              "OBSCURA": "Obscura-Canvas-Uniformity",
              "NATEBOT": "NateBot",
          }

          token = os.environ.get("GITHUB_TOKEN", "")

          headers = {
              "Accept": "application/vnd.github+json",
              "User-Agent": "profile-readme-stats-updater",
          }

          if token:
              headers["Authorization"] = f"Bearer {token}"

          def fetch_repo_stats(repo_name):
              url = f"https://api.github.com/repos/{OWNER}/{repo_name}"
              request = urllib.request.Request(url, headers=headers)

              with urllib.request.urlopen(request) as response:
                  data = json.load(response)

              return {
                  "stars": data["stargazers_count"],
                  "forks": data["forks_count"],
              }

          stats = {
              key: fetch_repo_stats(repo_name)
              for key, repo_name in REPOS.items()
          }

          replacements = {
              "OBSCURA_STARS": stats["OBSCURA"]["stars"],
              "OBSCURA_FORKS": stats["OBSCURA"]["forks"],
              "NATEBOT_STARS": stats["NATEBOT"]["stars"],
              "NATEBOT_FORKS": stats["NATEBOT"]["forks"],
          }

          readme_path = "README.md"

          with open(readme_path, "r", encoding="utf-8") as file:
              readme = file.read()

          for marker, value in replacements.items():
              pattern = rf"<!-- {marker} -->.*?<!-- /{marker} -->"
              replacement = f"<!-- {marker} -->{value}<!-- /{marker} -->"

              readme, count = re.subn(pattern, replacement, readme, flags=re.DOTALL)

              if count != 1:
                  raise RuntimeError(
                      f"Expected exactly one marker pair for {marker}, found {count}."
                  )

          with open(readme_path, "w", encoding="utf-8", newline="\n") as file:
              file.write(readme)
          PY

      - name: Commit updated README
        run: |
          if git diff --quiet README.md; then
            echo "No README stat changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "docs(readme): update repo stats"
            git push
          fi
